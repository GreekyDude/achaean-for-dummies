<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syllabary — Linear B</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="nav"></nav>
<main class="page">
  <div class="page-hero">
    <div class="section-title" id="pg-eyebrow">Reference</div>
    <h1 id="pg-title">The Syllabary</h1>
    <p class="subtitle" id="pg-sub">59 core signs · verified against Unicode Linear B block (U+10000–U+1003F) and kinezika.com</p>
  </div>
  <div class="panel">
    <p id="pg-intro"></p>
  </div>
  <div class="syl-grid" id="syl-grid"></div>
  <div class="detail-box" id="detail-box">
    <div id="detail-placeholder" style="color:var(--ink-faint);font-style:italic;font-size:.9rem"></div>
  </div>
  <div class="mt3">
    <div class="panel">
      <p id="grid-note"></p>
    </div>
  </div>
</main>
<footer><span class="signs">𐀷𐀙𐀏 𐀯𐀵 𐀏𐀏 𐀴𐀪𐀡</span>Linear B Mycenaean Script Reference</footer>
<script src="../js/data.js"></script>
<script src="../js/nav.js"></script>
<script>
const STRINGS = {
  en:{title:'The Syllabary',sub:'59 core signs · verified against Unicode Linear B block (U+10000–U+1003F) and kinezika.com',
    intro:'Linear B is a <strong>syllabary</strong>, not an alphabet. Each sign represents a syllable of the form V (vowel) or CV (consonant + vowel). Click any sign to see its phonetic value, notes, and an attested example.',
    grid:'Signs are organised by <strong>vowel column</strong> (a, e, i, o, u) and <strong>consonant row</strong>. Some cells are empty. The q-series (labio-velars kʷ/gʷ) and w-series (digamma Ϝ) both disappeared from later Greek.'},
  fr:{title:'Le Syllabaire',sub:'59 signes principaux · vérifiés sur le bloc Unicode Linéaire B (U+10000–U+1003F) et kinezika.com',
    intro:'Le Linéaire B est un <strong>syllabaire</strong>, pas un alphabet. Chaque signe représente une syllabe de la forme V (voyelle) ou CV (consonne + voyelle). Cliquez sur un signe pour voir sa valeur phonétique et un exemple attesté.',
    grid:'Les signes sont organisés par <strong>colonne de voyelle</strong> (a, e, i, o, u) et <strong>rangée de consonne</strong>. Certaines cellules sont vides. La série q (labio-vélaires kʷ/gʷ) et la série w (digamma Ϝ) ont disparu du grec classique.'},
  gr:{title:'Το Συλλαβάριο',sub:'59 βασικά σημεία · επαληθευμένα από το μπλοκ Unicode Γραμμικής Β (U+10000–U+1003F) και kinezika.com',
    intro:'Η Γραμμική Β είναι ένα <strong>συλλαβάριο</strong>, όχι αλφάβητο. Κάθε σημείο αντιπροσωπεύει μια συλλαβή της μορφής V (φωνήεν) ή CV (σύμφωνο + φωνήεν). Κάντε κλικ σε ένα σημείο για φωνητική τιμή και επικυρωμένο παράδειγμα.',
    grid:'Τα σημεία οργανώνονται κατά <strong>στήλη φωνήεντος</strong> (a, e, i, o, u) και <strong>σειρά συμφώνου</strong>. Μερικά κελιά είναι κενά. Η σειρά q (χειλοϋπερωικά kʷ/gʷ) και η σειρά w (δίγαμμα Ϝ) εξαφανίστηκαν από τα μεταγενέστερα ελληνικά.'},
};

document.addEventListener('DOMContentLoaded', () => {
  const s = STRINGS[LANG] || STRINGS.en;
  document.getElementById('pg-title').textContent = s.title;
  document.getElementById('pg-sub').textContent = s.sub;
  document.getElementById('pg-intro').innerHTML = s.intro;
  document.getElementById('grid-note').innerHTML = s.grid;
  document.getElementById('detail-placeholder').textContent = t('select_sign');

  const grid = document.getElementById('syl-grid');
  const box = document.getElementById('detail-box');
  let sel = null;

  SIGN_DETAILS.forEach(s => {
    const c = document.createElement('div');
    c.className = 'syl-card';
    c.innerHTML = `<span class="sign">${s.sign}</span><span class="val">${s.val}</span>`;
    c.addEventListener('click', () => {
      if (sel) sel.classList.remove('selected');
      c.classList.add('selected'); sel = c;
      box.innerHTML = `<div class="big-sign">${s.sign}</div><div>
        <div class="detail-val">${s.val}</div>
        <div class="detail-note">${tF(s.note)}</div>
        <div class="detail-ex">Example: <strong>${s.ex}</strong></div>
      </div>`;
    });
    grid.appendChild(c);
  });
});
</script>
</body>
</html>
