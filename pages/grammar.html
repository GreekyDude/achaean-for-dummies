<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar — Linear B</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="nav"></nav>
<main class="page">
  <div class="page-hero">
    <div class="section-title">Reference</div>
    <h1>Grammar</h1>
    <p class="subtitle">Cases, declensions, verbs, formulaic particles, and the 10 scribal rules</p>
  </div>
  <div class="gram-tabs" id="gram-tab-bar"></div>
  <div id="gram-content"></div>
</main>
<footer><span class="signs">𐀷𐀙𐀏 𐀯𐀵 𐀏𐀏 𐀴𐀪𐀡</span>Linear B Mycenaean Script Reference</footer>
<script src="../js/data.js"></script>
<script src="../js/nav.js"></script>
<script>
const GRAM_TABS=[
  {key:'cases',   label:{en:'Cases',fr:'Cas',gr:'Πτώσεις'}},
  {key:'decl',    label:{en:'Declensions',fr:'Déclinaisons',gr:'Κλίσεις'}},
  {key:'verbs',   label:{en:'Verbs',fr:'Verbes',gr:'Ρήματα'}},
  {key:'particles',label:{en:'Particles & Formulae',fr:'Particules',gr:'Μόρια'}},
  {key:'scribal', label:{en:'Scribal Rules',fr:'Règles de scribes',gr:'Κανόνες γραφής'}},
];

const DECL_DATA={
  wanax:{title:'wanax — "king" (3rd decl. consonant stem wanakt-)',rows:[
    ['Nominative','wa-na-ka','𐀷𐀙𐀏','wanaks','★ attested'],
    ['Genitive','wa-na-ka-to','𐀷𐀙𐀏𐀵','wanaktos','★ attested'],
    ['Dative','wa-na-ka-te','𐀷𐀙𐀏𐀳','wanaktei','★ attested'],
    ['Accusative','wa-na-ka-ta','𐀷𐀙𐀏𐀲','wanakta','reconstructed'],
    ['Adjective','wa-na-ka-te-ro','𐀷𐀙𐀏𐀳𐀫','wanakteros ("of the king")','★ attested'],
  ]},
  doero:{title:'do-e-ro — "slave" (2nd decl. masc. o-stem)',rows:[
    ['Nominative','do-e-ro','𐀈𐀁𐀫','doelos','★'],
    ['Genitive','do-e-ro-jo','𐀈𐀁𐀫𐀍','doelojo','★'],
    ['Dative','do-e-ro-i','𐀈𐀁𐀫𐀂','doeloi','reconstructed'],
    ['Female nom.','do-e-ra','𐀈𐀁𐀨','doelā (female slave)','★'],
  ]},
  sito:{title:'si-to — "grain" (2nd decl. neuter o-stem)',rows:[
    ['Nominative','si-to','𐀯𐀵','sitos','★'],
    ['Genitive','si-to-jo','𐀯𐀵𐀍','sitojo','attested'],
    ['Acc. plural','si-ta','𐀯𐀲','sita','★'],
    ['With total','to-so si-to','𐀵𐀰 𐀯𐀵','tosos sitos = "so much grain"','★ hundreds of tablets'],
  ]},
};

const VERBS=[
  {lb:'e-ko',signs:'𐀁𐀏',rec:'ekhō / ekhei',meaning:'to have / he has',att:'★'},
  {lb:'do-ke',signs:'𐀈𐀐',rec:'dōke',meaning:'he gave (no augment)',att:'★'},
  {lb:'a-pe-do-ke',signs:'𐀀𐀟𐀈𐀐',rec:'apedōke',meaning:'delivered / gave back',att:'★ only augmented form'},
  {lb:'we-ke',signs:'𐀸𐀐',rec:'wergei',meaning:'works on, makes',att:'★'},
  {lb:'jo-a-se-so-si',signs:'𐀍𐀀𐀮𐀰𐀯',rec:'hō asēsonsi',meaning:'thus will they fatten (future 3pl.)',att:'★ PY Cn 608'},
  {lb:'e-re-u-te-ro',signs:'𐀁𐀩𐀄𐀳𐀫',rec:'eleutheros',meaning:'free (status adjective)',att:'★'},
];

const PARTICLES=[
  {lb:'to-so',signs:'𐀵𐀰',fn:'"so much/many" (tosos) — introduces a total. Most common tally word.'},
  {lb:'to-so-de',signs:'𐀵𐀰𐀆',fn:'"and so many" — running total with connective -de'},
  {lb:'pa-ro',signs:'𐀞𐀫',fn:'"from, in the charge of" (para) — common header before a name'},
  {lb:'o-pi',signs:'𐀃𐀠',fn:'"in addition to" (epi) — used with quantities'},
  {lb:'we-ke',signs:'𐀸𐀐',fn:'"works on, makes" (wergei) — craftsman formula'},
  {lb:'e-ko',signs:'𐀁𐀏',fn:'"has/holds" (ekhei) — possession formula'},
  {lb:'do-ke',signs:'𐀈𐀐',fn:'"gave" (dōke) — past delivery formula (no augment)'},
  {lb:'a-pe-do-ke',signs:'𐀀𐀟𐀈𐀐',fn:'"delivered, gave back" — the only augmented verb form in the corpus'},
];

function renderCases(){
  return `<div class="panel"><p>Mycenaean Greek had <strong>5 cases</strong> — nominative, accusative, genitive, dative-locative, and instrumental. Because Linear B drops final consonants, cases are often visually similar — context and ideograms disambiguate. Source: Ventris & Chadwick, <em>Documents in Mycenaean Greek</em>.</p></div>
  <table><tr><th>Case</th><th>Function</th><th>Linear B</th><th>Signs</th><th>Reconstructed</th></tr>
  ${GRAMMAR.cases.map(r=>`<tr><td><strong>${r.case}</strong></td><td>${r.fn}</td><td><code>${r.lb}</code></td><td><span class="sign-md">${r.signs}</span></td><td>${r.rec} <span class="attested">${r.att}</span></td></tr>`).join('')}
  </table>`;
}

function renderDecl(){
  const tabs=['wanax','doero','sito'];
  const tabBtns=tabs.map((id,i)=>`<button class="gram-tab${i===0?' active':''}" onclick="switchDecl('${id}',this)">${DECL_DATA[id].title.split('—')[0].trim()}</button>`).join('');
  return `<div class="gram-tabs" id="decl-tabs" style="margin-bottom:.75rem">${tabBtns}</div>
  <div id="decl-content"></div>
  <div class="panel"><p><span class="attested">★</span> = directly attested on tablets. Others reconstructed from spelling rules and comparative Greek. Source: Tentative Grammar §19–23.</p></div>`;
}

function switchDecl(id,btn){
  document.querySelectorAll('#decl-tabs .gram-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const d=DECL_DATA[id];
  document.getElementById('decl-content').innerHTML=`
    <div style="font-size:.9rem;font-weight:600;color:var(--clay-light);margin-bottom:.75rem">${d.title}</div>
    <table><tr><th>Case</th><th>Transliteration</th><th>Signs</th><th>Reconstructed</th><th></th></tr>
    ${d.rows.map(r=>`<tr><td>${r[0]}</td><td><code>${r[1]}</code></td><td><span class="sign-md">${r[2]}</span></td><td style="color:var(--ink-dim)">${r[3]}</td><td><span class="${r[4].startsWith('★')?'attested':'small muted'}">${r[4]}</span></td></tr>`).join('')}
    </table>`;
}

function renderVerbs(){
  return `<div class="panel"><p>Verbs are poorly represented — tablets are administrative records, not literature. The past-tense augment (e- prefix) is <strong>almost entirely absent</strong>. Only one augmented form exists in the entire corpus: <code>a-pe-do-ke</code>.</p></div>
  <table><tr><th>Signs</th><th>Linear B</th><th>Reconstructed</th><th>Meaning</th><th></th></tr>
  ${VERBS.map(v=>`<tr><td><span class="sign-md">${v.signs}</span></td><td><code>${v.lb}</code></td><td>${v.rec}</td><td>${v.meaning}</td><td><span class="attested">${v.att}</span></td></tr>`).join('')}
  </table>`;
}

function renderParticles(){
  return `<div class="panel"><p>These short words recur across hundreds of tablets. Recognising them lets you parse an unfamiliar tablet quickly — even before you can read the content words.</p></div>
  <table><tr><th>Signs</th><th>Linear B</th><th>Meaning / Function</th></tr>
  ${PARTICLES.map(p=>`<tr><td><span class="sign-md">${p.signs}</span></td><td><code>${p.lb}</code></td><td>${p.fn}</td></tr>`).join('')}
  </table>`;
}

function renderScribal(){
  return `<div class="panel"><p>Linear B was adapted from Linear A (a non-Greek script). This mismatch created systematic spelling workarounds. These 10 rules are <strong>essential</strong> to reading. Sources: Wikipedia Linear B; Ventris & Chadwick <em>Documents</em>.</p></div>
  <div class="rules-grid">${SCRIBAL_RULES.map(r=>`<div class="rule-card"><strong>${r.n}. ${r.title}</strong><p>${r.body}</p><span class="ex">${r.ex}</span></div>`).join('')}</div>`;
}

const RENDERS={cases:renderCases,decl:renderDecl,verbs:renderVerbs,particles:renderParticles,scribal:renderScribal};

function showGram(key,btn){
  document.querySelectorAll('#gram-tab-bar .gram-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('gram-content').innerHTML=RENDERS[key]();
  if(key==='decl') switchDecl('wanax',document.querySelector('#decl-tabs .gram-tab'));
}

document.addEventListener('DOMContentLoaded',()=>{
  const bar=document.getElementById('gram-tab-bar');
  GRAM_TABS.forEach((tab,i)=>{
    const b=document.createElement('button');
    b.className='gram-tab'+(i===0?' active':'');
    b.textContent=tab.label[LANG]||tab.label.en;
    b.addEventListener('click',()=>showGram(tab.key,b));
    bar.appendChild(b);
  });
  showGram('cases',bar.querySelector('.gram-tab'));
});
</script>
</body>
</html>
