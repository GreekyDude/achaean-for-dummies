<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear B — Mycenaean Script</title>
<link rel="stylesheet" href="css/style.css">
<style>
.home-main{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:calc(var(--nav-h) + 2rem) 2rem 4rem;position:relative;overflow:hidden}
.hero-bg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(6rem,22vw,16rem);color:var(--stone-800);letter-spacing:.15em;line-height:1;pointer-events:none;user-select:none;white-space:nowrap;opacity:.5}
.home-inner{max-width:900px;margin:0 auto;position:relative;z-index:1;text-align:center}
.eyebrow{font-family:var(--font-mono);font-size:.65rem;letter-spacing:.4em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:1.25rem;display:block}
.home-h1{font-size:clamp(2.2rem,7vw,5rem);line-height:1.05;color:var(--stone-50);margin-bottom:.75rem;text-shadow:0 0 60px rgba(201,162,39,.25)}
.home-lead{font-size:1.05rem;color:var(--ink-faint);font-style:italic;max-width:560px;margin:0 auto 3rem;line-height:1.7}
.divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--amber-dim),transparent);margin:1.5rem auto}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1rem;text-align:left;margin-bottom:3rem}
.home-card{background:linear-gradient(160deg,var(--stone-900) 0%,var(--stone-850) 100%);border:1px solid var(--stone-700);border-radius:var(--radius-lg);padding:1.5rem 1.25rem;transition:all .25s;text-decoration:none;display:block;box-shadow:var(--shadow-md);position:relative;overflow:hidden}
.home-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--amber-dim),transparent);opacity:0;transition:opacity .25s}
.home-card:hover{border-color:var(--stone-600);transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.home-card:hover::before{opacity:1}
.hc-icon{font-size:2rem;margin-bottom:.75rem;display:block}
.hc-num{font-family:var(--font-mono);font-size:.55rem;color:var(--amber-dim);letter-spacing:.2em;display:block;margin-bottom:.3rem}
.hc-title{font-family:var(--font-display);font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:var(--clay-light);margin-bottom:.4rem}
.hc-desc{font-size:.82rem;color:var(--ink-faint);line-height:1.55}
footer{border-top:1px solid var(--stone-800);padding:2rem;text-align:center;color:var(--ink-faint);font-size:.8rem}
.footer-signs{font-size:1.4rem;letter-spacing:6px;display:block;margin-bottom:.5rem;opacity:.3}
</style>
</head>
<body>
<nav class="nav"></nav>
<main class="home-main">
  <div class="hero-bg" aria-hidden="true">𐀷𐀙𐀏</div>
  <div class="home-inner">
    <span class="eyebrow" id="h-eyebrow"></span>
    <h1 class="home-h1">Linear B</h1>
    <p class="home-lead" id="h-tagline"></p>
    <div class="divider"></div>
    <div class="home-grid" id="home-grid"></div>
    <div class="divider"></div>
    <p style="font-size:.8rem;color:var(--ink-faint);max-width:480px;margin:0 auto">
      All signs verified against <strong style="color:var(--stone-300)">kinezika.com</strong> and Unicode Linear B Syllabary (U+10000–U+1003F). Tablet data from Ventris &amp; Chadwick, <em>Documents in Mycenaean Greek</em>, and Nakassis (2018).
    </p>
  </div>
</main>
<footer>
  <span class="footer-signs">𐀷𐀙𐀏 𐀯𐀵 𐀏𐀏 𐀴𐀪𐀡</span>
  wa-na-ka · si-to · ka-ko · ti-ri-po
</footer>
<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script>
const CARDS=[
  {icon:'𐀷',n:'01',tk:'nav_syllabary',f:'pages/syllabary.html',d:{en:'All 59 core signs with phonetic values, notes, and attested examples.',fr:'Les 59 signes avec valeurs phonétiques et exemples attestés.',gr:'59 σημεία με φωνητικές τιμές και επικυρωμένα παραδείγματα.'}},
  {icon:'⇄',n:'02',tk:'nav_translit',f:'pages/transliterator.html',d:{en:'Type Mycenaean transliteration and see Linear B signs appear live.',fr:'Tapez la translittération mycénienne et voyez les signes apparaître.',gr:'Πληκτρολογήστε μεταγραφή και δείτε τα σημεία ζωντανά.'}},
  {icon:'𐀴𐀪𐀡',n:'03',tk:'nav_tablets',f:'pages/tablets.html',d:{en:'7 real tablets: Ta 641, Tn 316, Cn 608, Jn 829, and more.',fr:'7 tablettes réelles : Ta 641, Tn 316, Cn 608, Jn 829…',gr:'7 πραγματικές πινακίδες: Ta 641, Tn 316, Cn 608, Jn 829…'}},
  {icon:'📐',n:'04',tk:'nav_grammar',f:'pages/grammar.html',d:{en:'Cases, declensions, verbs, particles, and the 10 scribal rules.',fr:'Cas, déclinaisons, verbes, particules et 10 règles de scribes.',gr:'Πτώσεις, κλίσεις, ρήματα, μόρια και 10 κανόνες γραφής.'}},
  {icon:'📚',n:'05',tk:'nav_vocab',f:'pages/vocabulary.html',d:{en:'25+ attested words by domain: titles, religion, commodities, places.',fr:'25+ mots attestés par domaine : titres, religion, marchandises.',gr:'25+ λέξεις ανά θεματική: τίτλοι, θρησκεία, εμπορεύματα.'}},
  {icon:'𐄫',n:'06',tk:'nav_numbers',f:'pages/numbers.html',d:{en:'The Aegean decimal system with a live number calculator.',fr:'Le système décimal égéen avec calculateur en direct.',gr:'Το αιγαιακό δεκαδικό σύστημα με ζωντανή αριθμομηχανή.'}},
  {icon:'🎯',n:'07',tk:'nav_quiz',f:'pages/quiz.html',d:{en:'Three quiz modes: sign → syllable, syllable → sign, read a word.',fr:'Trois modes : signe→syllabe, syllabe→signe, lire un mot.',gr:'Τρεις λειτουργίες: σημείο→συλλαβή, συλλαβή→σημείο, λέξη.'}},
  {icon:'🔍',n:'08',tk:'nav_decode',f:'pages/decode.html',d:{en:'Real Linear B words appear — click syllables in order to decode.',fr:'De vrais mots en Linéaire B — cliquez les syllabes dans l\'ordre.',gr:'Πραγματικές λέξεις — κάντε κλικ στις συλλαβές με τη σειρά.'}},
  {icon:'🌐',n:'09',tk:'nav_translate',f:'pages/translator.html',d:{en:'Type English, French or Greek — find the Mycenaean equivalent.',fr:'Tapez en anglais, français ou grec — trouvez l\'équivalent mycénien.',gr:'Πληκτρολογήστε αγγλικά, γαλλικά ή ελληνικά — βρείτε τη μυκηναϊκή λέξη.'}},
];
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('h-eyebrow').textContent=t('hero_eyebrow');
  document.getElementById('h-tagline').textContent=t('hero_tagline');
  const grid=document.getElementById('home-grid');
  CARDS.forEach(c=>{
    const a=document.createElement('a');
    a.className='home-card'; a.href=c.f;
    a.innerHTML=`<span class="hc-icon">${c.icon}</span><span class="hc-num">${c.n}</span><div class="hc-title">${t(c.tk)}</div><p class="hc-desc">${c.d[LANG]||c.d.en}</p>`;
    grid.appendChild(a);
  });
});
</script>
</body>
</html>
